    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0e0e0e;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
            color: #f0f0f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
            color: #ffffff;
            border-left: 4px solid #bb86fc;
            padding-left: 1rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 600px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a2a2a;
            transition: transform 0.15s ease, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: #bb86fc;
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #2c2c2c;
        }

        .card-header .nome-artistico {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .card-header .tipo {
            background: #2a2a2a;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #bb86fc;
            border: 1px solid #3a3a3a;
            white-space: nowrap;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
            font-size: 0.9rem;
            line-height: 1.5;
            padding: 0.2rem 0;
            border-bottom: 1px dashed #282828;
        }

        .info-row:last-of-type {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #aaa;
            min-width: 110px;
            letter-spacing: 0.2px;
            text-transform: capitalize;
        }

        .info-value {
            color: #e8e8e8;
            word-break: break-word;
            flex: 1;
        }

        .info-value a {
            color: #bb86fc;
            text-decoration: none;
            word-break: break-all;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        .info-value.null-value {
            color: #666;
            font-style: italic;
        }

        .bio-text {
            background: #121212;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #d0d0d0;
            margin-top: 0.2rem;
            border-left: 3px solid #bb86fc;
            max-height: 220px;
            overflow-y: auto;
        }

        .bio-text::-webkit-scrollbar {
            width: 4px;
        }
        .bio-text::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .bio-text::-webkit-scrollbar-thumb {
            background: #bb86fc;
            border-radius: 8px;
        }

        .badge-termos {
            display: inline-block;
            background: #2a2a2a;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #8bc34a;
            border: 1px solid #3a3a3a;
        }

        .badge-termos.false {
            color: #f44336;
        }

        /* responsividade fina */
        @media (max-width: 480px) {
            .card-header .nome-artistico {
                font-size: 1.2rem;
            }
            .info-label {
                min-width: 80px;
                font-size: 0.8rem;
            }
            .info-value {
                font-size: 0.8rem;
            }
            .bio-text {
                font-size: 0.8rem;
                padding: 0.6rem;
            }
            body {
                padding: 1rem 0.5rem;
            }
        }
    </style>
</head>

        const container = document.getElementById('cardsContainer');

        // Função para formatar valor nulo/indefinido
        function formatValue(value) {
            if (value === null || value === undefined || value === '') {
                return '<span class="null-value">Não informado</span>';
            }
            if (typeof value === 'boolean') {
                return value ? '✅ Sim' : '❌ Não';
            }
            // Se for string com URL, tenta criar link
            const str = String(value);
            // Verifica se parece uma URL
            if (str.match(/^https?:\/\/\S+/i)) {
                return `<a href="${str}" target="_blank" rel="noopener noreferrer">${str}</a>`;
            }
            // Se for email
            if (str.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                return `<a href="mailto:${str}">${str}</a>`;
            }
            // Se for telefone (simples)
            if (str.match(/^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$/)) {
                return `<a href="tel:${str.replace(/\s/g, '')}">${str}</a>`;
            }
            return str;
        }

        // Mapeamento de rótulos amigáveis
        const labels = {
            bio: 'Biografia',
            cidade: 'Cidade',
            dataHora: 'Data/Hora',
            email: 'E-mail',
            genero: 'Gênero musical',

        // Ordem desejada para exibição (campos mais relevantes primeiro)
        const ordem = [
            'nomeArtistico', 'nome', 'tipo', 'tipoApresentacao', 'genero',
            'cidade', 'telefone', 'email', 'instagram', 'youtube', 'tiktok',
            'spotify', 'portfolioLink', 'musicas', 'bio', 'nascimento',
            'dataHora', 'termos', 'documentos', 'tempoApresentacao'
        ];

        artistas.forEach((artista, index) => {
            const card = document.createElement('div');
            card.className = 'card';

            // Cabeçalho
            const header = document.createElement('div');
            header.className = 'card-header';

            const nomeArt = document.createElement('span');
            nomeArt.className = 'nome-artistico';
            nomeArt.textContent = artista.nomeArtistico || 'Sem nome artístico';

            const tipoBadge = document.createElement('span');
            tipoBadge.className = 'tipo';
            tipoBadge.textContent = artista.tipo || 'artista';

            header.appendChild(nomeArt);
            header.appendChild(tipoBadge);
            card.appendChild(header);

            // Corpo
            const body = document.createElement('div');
            body.className = 'card-body';

            ordem.forEach((key) => {
                // Ignora campos que não existem no objeto ou que são duplicados no cabeçalho (já mostramos nomeArtistico e tipo)
                if (key === 'nomeArtistico' || key === 'tipo') return;

                const value = artista[key];
                // Se for null/undefined ou string vazia, mostramos como não informado
                const displayValue = formatValue(value);

                const row = document.createElement('div');
                row.className = 'info-row';

                const label = document.createElement('span');
                label.className = 'info-label';
                label.textContent = labels[key] || key;

                const valueSpan = document.createElement('span');
                valueSpan.className = 'info-value';
                valueSpan.innerHTML = displayValue;

                row.appendChild(label);
                row.appendChild(valueSpan);
                body.appendChild(row);
            });

            card.appendChild(body);
            container.appendChild(card);
        });
